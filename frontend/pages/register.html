<!doctype html>
<html lang="en-US">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register - Royal Nepal</title>
    
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <link rel="stylesheet" href="../css/auth.css" />

</head>
<body class="register-page">
    <main class="auth-wrapper">
        <!-- Left Side - Branding -->
        <section class="auth-left">
            <div class="auth-branding">
                <h1>Royal Nepal</h1>
                <p>Experience the pride of Nepalese 🇳🇵</p>
                
                <div class="feature-list">
                    <div class="feature-item">
                        <i class="bi bi-person-plus-fill"></i>
                        <span>Create your free account</span>
                    </div>
                    <div class="feature-item">
                        <i class="bi bi-bookmark-star-fill"></i>
                        <span>Save your favorite destinations</span>
                    </div>
                    <div class="feature-item">
                        <i class="bi bi-clock-history"></i>
                        <span>Track your bookings easily</span>
                    </div>
                    <div class="feature-item">
                        <i class="bi bi-percent"></i>
                        <span>Get exclusive member discounts</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Right Side - Register Form -->
        <section class="auth-right">
            <div class="auth-card">
                <div class="auth-header">
                    <h2>Create Account 🎉</h2>
                    <p>Join us to explore Nepal</p>
                </div>

                <div id="messageBox" class="message-box"></div>

                <form id="registerForm">
                    <div class="row-custom">
                        <div class="col-custom">
                            <div class="form-group-custom">
                                <label for="firstName">First Name</label>
                                <div class="input-container">
                                    <i class="bi bi-person"></i>
                                    <input type="text" id="firstName" placeholder="First name" required>
                                </div>
                            </div>
                        </div>
                        <div class="col-custom">
                            <div class="form-group-custom">
                                <label for="lastName">Last Name</label>
                                <div class="input-container">
                                    <i class="bi bi-person"></i>
                                    <input type="text" id="lastName" placeholder="Last name" required>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="form-group-custom">
                        <label for="email">Email Address</label>
                        <div class="input-container">
                            <i class="bi bi-envelope"></i>
                            <input type="email" id="email" placeholder="your@email.com" required>
                        </div>
                    </div>

                    <div class="form-group-custom">
                        <label for="phone">Phone Number</label>
                        <div class="input-container">
                            <i class="bi bi-telephone"></i>
                            <input type="tel" id="phone" placeholder="98XXXXXXXX" 
                                required 
                                pattern="[0-9]{10}" 
                                maxlength="10"
                                title="Phone number must be exactly 10 digits">
                        </div>
                    </div>

                    <div class="form-group-custom">
                        <label for="password">Password</label>
                        <div class="input-container">
                            <i class="bi bi-lock"></i>
                            <input type="password" id="password" placeholder="Min 6 characters" required minlength="6">
                        </div>
                        <div class="password-strength" id="passwordStrength"></div>
                    </div>

                    <div class="form-group-custom">
                        <label for="confirmPassword">Confirm Password</label>
                        <div class="input-container">
                            <i class="bi bi-lock-fill"></i>
                            <input type="password" id="confirmPassword" placeholder="Repeat password" required>
                        </div>
                    </div>

                    <div class="auth-options" style="justify-content: flex-start; gap: 1rem;">
                        <input type="checkbox" id="agreeTerms" required style="width: 18px; height: 18px; accent-color: var(--primary-red);">
                        <label for="agreeTerms" class="text-muted" style="font-size: 0.9rem;">
                            I agree to the <a href="#" style="color: var(--primary-red); font-weight: 600;">Terms</a> and <a href="#" style="color: var(--primary-red); font-weight: 600;">Privacy Policy</a>
                        </label>
                    </div>

                    <!-- Hidden CSRF Token -->
                    <input type="hidden" id="csrfToken" name="csrf_token">

                    <button type="submit" class="btn-login" id="registerBtn" style="background: var(--text-dark); box-shadow: 0 8px 16px rgba(0,0,0,0.1);">
                        <span class="btn-text"><i class="bi bi-person-plus"></i> Create Account</span>
                        <span class="btn-loader" style="display: none;">
                            <i class="bi bi-arrow-repeat spin"></i> Creating...
                        </span>
                    </button>
                </form>

                <div class="auth-footer">
                    <p>
                        Already have an account? 
                        <a href="login.html">Login here</a>
                    </p>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" defer></script>
    <script src="../js/routes.js" defer></script>
    <script src="../js/auth.js" defer></script>

</body>
</html>
